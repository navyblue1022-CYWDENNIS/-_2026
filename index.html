<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>震豐化學品互動查詢系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",Roboto,sans-serif;background:#F3F4F6;color:#111827;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0 16px}
.header h1{font-size:22px;font-weight:700;color:#1E40AF;margin-bottom:4px}
.header .sub{font-size:13px;color:#6B7280}
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:13px 44px 13px 44px;font-size:15px;border:2px solid #D1D5DB;border-radius:12px;outline:none;background:#fff;transition:border-color .2s}
.search-box input:focus{border-color:#2563EB}
.search-box .icon-s{position:absolute;left:14px;top:14px;color:#9CA3AF;pointer-events:none}
.search-box .icon-x{position:absolute;right:10px;top:10px;background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;padding:4px 6px;border-radius:4px}
.search-box .icon-x:hover{background:#F3F4F6}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn-filter{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;border:1px solid #D1D5DB;background:#F9FAFB;color:#374151;transition:all .15s}
.btn-filter.active{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE}
.btn-clear{font-size:12px;color:#EF4444;background:none;border:none;cursor:pointer;font-weight:500}
.btn-clear:hover{text-decoration:underline}
.count{font-size:13px;color:#6B7280;margin-left:auto}
.count strong{color:#111827}
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:14px;background:#F9FAFB;border-radius:10px;border:1px solid #E5E7EB;margin-bottom:14px}
.filters label{font-size:11px;font-weight:600;color:#6B7280;display:block;margin-bottom:4px}
.filters select{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;cursor:pointer}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:box-shadow .2s}
.card.open{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-head{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.card-head:hover{background:#FAFBFC}
.card-info{flex:1;min-width:0}
.card-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.tag-cas{font-family:monospace;font-size:13px;color:#6B7280;background:#F9FAFB;padding:2px 8px;border-radius:4px;border:1px solid #E5E7EB;white-space:nowrap}
.tag-cat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tag-sys{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600}
.tag-sys.y{background:#DCFCE7;color:#166534}
.tag-sys.n{background:#FEF9C3;color:#854D0E}
.card-name{font-size:15px;font-weight:600;color:#111827}
.card-en{font-size:12px;color:#6B7280;margin-top:1px}
.arrow{flex-shrink:0;color:#9CA3AF;font-size:14px;transition:transform .2s}
.card.open .arrow{transform:rotate(180deg)}
.card-body{padding:0 18px 16px;border-top:1px solid #F3F4F6}
.props{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.prop{background:#F9FAFB;border-radius:8px;padding:8px 12px}
.prop-label{font-size:11px;color:#6B7280;font-weight:500;margin-bottom:2px}
.prop-val{font-size:13px;color:#111827;font-weight:500;word-break:break-word}
.empty{text-align:center;padding:40px;color:#9CA3AF}
.empty svg{margin-bottom:10px;opacity:.5}
.empty .t1{font-size:15px}
.empty .t2{font-size:13px;margin-top:4px}
.pager{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px}
.pager button{padding:6px 14px;font-size:13px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;color:#374151;cursor:pointer}
.pager button:disabled{background:#F3F4F6;color:#D1D5DB;cursor:default}
.pager span{font-size:13px;color:#6B7280}
.footer{text-align:center;margin-top:20px;padding:12px;font-size:11px;color:#9CA3AF;border-top:1px solid #E5E7EB}
.stat-bar{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.stat-item{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:10px 18px;text-align:center;min-width:100px}
.stat-num{font-size:20px;font-weight:700;color:#2563EB}
.stat-label{font-size:11px;color:#6B7280;margin-top:2px}
@media(max-width:600px){
  .wrap{padding:10px}
  .header h1{font-size:18px}
  .props{grid-template-columns:1fr}
  .filters{grid-template-columns:1fr}
  .stat-bar{gap:6px}
  .stat-item{padding:8px 12px;min-width:80px}
  .stat-num{font-size:16px}
}
</style>
</head>

    </div>
    <div>
      <label>產業 Industry</label>
      <select id="fInd"><option value="">全部產業</option></select>
    </div>
    <div>
      <label>系統狀態</label>
      <select id="fSys">
        <option value="">全部</option>
        <option value="Y">系統內 (已建檔)</option>
        <option value="N">新發現 (待開發)</option>
      </select>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <!-- Pager -->
  <div class="pager" id="pager" style="display:none">
    <button id="prevBtn">上一頁</button>
    <span id="pageInfo">1 / 1</span>
    <button id="nextBtn">下一頁</button>
  </div>

</div>

// === APPLICATION LOGIC ===
var state = { search: "", cat: "", ind: "", sys: "", page: 0, expanded: null, showFilters: false };
var PAGE_SIZE = 30;

// Build category and industry lists
var cats = {};
var inds = {};
DATA.forEach(function(d) {
  if (d.cat) cats[d.cat] = 1;
  if (d.ti) d.ti.split("/").forEach(function(i) { if (i) inds[i] = 1; });
});
var catList = Object.keys(cats).sort();
var indList = Object.keys(inds).sort();

// Populate dropdowns
var fCat = document.getElementById("fCat");
catList.forEach(function(c) { var o = document.createElement("option"); o.value = c; o.textContent = c; fCat.appendChild(o); });
var fInd = document.getElementById("fInd");
indList.forEach(function(i) { var o = document.createElement("option"); o.value = i; o.textContent = i; fInd.appendChild(o); });

// Stats
var sysCount = DATA.filter(function(d) { return d.sys === "Y"; }).length;
var newCount = DATA.filter(function(d) { return d.sys === "N"; }).length;
document.getElementById("total").textContent = DATA.length;
document.getElementById("st-total").textContent = DATA.length;
document.getElementById("st-sys").textContent = sysCount;
document.getElementById("st-new").textContent = newCount;
document.getElementById("st-cats").textContent = catList.length;

// Badge colors
var BADGE = {
  "Acid":{bg:"#FEF2F2",t:"#991B1B",b:"#FECACA"},"Amine":{bg:"#EFF6FF",t:"#1E40AF",b:"#BFDBFE"},
  "Base/Alkali":{bg:"#F0FDF4",t:"#166534",b:"#BBF7D0"},"Biocide":{bg:"#FFF7ED",t:"#9A3412",b:"#FED7AA"},
  "Food/Pharma":{bg:"#FEFCE8",t:"#854D0E",b:"#FEF08A"},"Glycol/Polyol":{bg:"#F5F3FF",t:"#5B21B6",b:"#DDD6FE"},
  "Inorganic Salt":{bg:"#F0FDFA",t:"#115E59",b:"#99F6E4"},"Oil/Lubricant":{bg:"#FFFBEB",t:"#92400E",b:"#FDE68A"},
  "Solvent":{bg:"#EEF2FF",t:"#3730A3",b:"#C7D2FE"},"Specialty Chemical":{bg:"#FDF4FF",t:"#86198F",b:"#F5D0FE"},
  "Surfactant":{bg:"#F0F9FF",t:"#075985",b:"#BAE6FD"},"Water Treatment":{bg:"#ECFDF5",t:"#065F46",b:"#A7F3D0"}
};
var BADGE_DEFAULT = {bg:"#F3F4F6",t:"#374151",b:"#D1D5DB"};

function filter() {
  var s = state.search.toLowerCase().trim();
  return DATA.filter(function(d) {
    if (s) {
      var ok = d.c.toLowerCase().indexOf(s) >= 0 || (d.z||"").toLowerCase().indexOf(s) >= 0 || (d.e||"").toLowerCase().indexOf(s) >= 0 || (d.sup||"").toLowerCase().indexOf(s) >= 0;
      if (!ok) return false;
    }
    if (state.cat && d.cat !== state.cat) return false;
    if (state.ind && (d.ti||"").indexOf(state.ind) < 0) return false;
    if (state.sys === "Y" && d.sys !== "Y") return false;
    if (state.sys === "N" && d.sys !== "N") return false;
    return true;
  });
}

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function propHtml(label, val) {
  if (!val) return "";
  return '<div class="prop"><div class="prop-label">' + esc(label) + '</div><div class="prop-val">' + esc(val) + '</div></div>';
}

function render() {
  var results = filter();
  var totalPages = Math.ceil(results.length / PAGE_SIZE) || 1;
  if (state.page >= totalPages) state.page = totalPages - 1;
  if (state.page < 0) state.page = 0;
  var start = state.page * PAGE_SIZE;
  var paged = results.slice(start, start + PAGE_SIZE);

  document.getElementById("resultCount").textContent = results.length;

  // Active filters badge
  var af = [state.cat, state.ind, state.sys].filter(Boolean).length;
  var badge = document.getElementById("filterBadge");
  badge.style.display = af > 0 ? "inline" : "none";
  badge.textContent = af;
  document.getElementById("btnClearAll").style.display = af > 0 ? "inline" : "none";
  document.getElementById("btnFilter").className = state.showFilters ? "btn-filter active" : "btn-filter";
  document.getElementById("filterPanel").style.display = state.showFilters ? "grid" : "none";

  // Cards
  var html = "";
  if (paged.length === 0) {
    html = '<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><div class="t1">查無符合條件的產品</div><div class="t2">請調整搜尋關鍵字或篩選條件</div></div>';
  } else {
    paged.forEach(function(d) {
      var isOpen = state.expanded === d.c;
      var b = BADGE[d.cat] || BADGE_DEFAULT;
      var catTag = d.cat ? '<span class="tag-cat" style="background:'+b.bg+';color:'+b.t+';border:1px solid '+b.b+'">' + esc(d.cat) + '</span>' : "";
      var sysTag = d.sys === "Y" ? '<span class="tag-sys y">系統內</span>' : '<span class="tag-sys n">新發現</span>';
      var enLine = d.e ? '<div class="card-en">' + esc(d.e) + '</div>' : "";

      html += '<div class="card' + (isOpen ? " open" : "") + '" data-cas="' + d.c + '">';
      html += '<div class="card-head" data-cas="' + d.c + '">';
      html += '<div class="card-info"><div class="card-tags"><span class="tag-cas">' + esc(d.c) + '</span>' + catTag + sysTag + '</div>';
      html += '<div class="card-name">' + esc(d.z || "—") + '</div>' + enLine + '</div>';
      html += '<div class="arrow">&#9660;</div></div>';

      if (isOpen) {
        html += '<div class="card-body"><div class="props">';
        html += propHtml("型態 Form", d.f);
        html += propHtml("pH", d.ph);
        html += propHtml("密度 Density", d.d);
        html += propHtml("目標產業", d.ti);
        html += propHtml("應用", d.app);
        html += propHtml("文件", d.doc);
        html += propHtml("供應商", d.sup);
        html += propHtml("參考價 NT$/kg", d.pr);
        html += '</div></div>';
      }
      html += '</div>';
    });
  }
  document.getElementById("results").innerHTML = html;

  // Pager
  var pagerEl = document.getElementById("pager");
  if (totalPages > 1) {
    pagerEl.style.display = "flex";
    document.getElementById("pageInfo").textContent = (state.page + 1) + " / " + totalPages;
    document.getElementById("prevBtn").disabled = state.page === 0;
    document.getElementById("nextBtn").disabled = state.page >= totalPages - 1;
  } else {
    pagerEl.style.display = "none";
  }
}

// Event listeners
document.getElementById("searchInput").addEventListener("input", function(e) {
  state.search = e.target.value;
  state.page = 0;
  state.expanded = null;
  document.getElementById("clearSearch").style.display = e.target.value ? "block" : "none";
  render();
});

document.getElementById("clearSearch").addEventListener("click", function() {
  state.search = "";
  state.page = 0;
  document.getElementById("searchInput").value = "";
  document.getElementById("clearSearch").style.display = "none";
  render();
});

document.getElementById("btnFilter").addEventListener("click", function() {
  state.showFilters = !state.showFilters;
  render();
});

document.getElementById("btnClearAll").addEventListener("click", function() {
  state.cat = ""; state.ind = ""; state.sys = ""; state.page = 0;
  document.getElementById("fCat").value = "";
  document.getElementById("fInd").value = "";
  document.getElementById("fSys").value = "";
  render();
});

document.getElementById("fCat").addEventListener("change", function(e) { state.cat = e.target.value; state.page = 0; render(); });
document.getElementById("fInd").addEventListener("change", function(e) { state.ind = e.target.value; state.page = 0; render(); });
document.getElementById("fSys").addEventListener("change", function(e) { state.sys = e.target.value; state.page = 0; render(); });

document.getElementById("prevBtn").addEventListener("click", function() { if (state.page > 0) { state.page--; state.expanded = null; render(); window.scrollTo(0, 0); } });
document.getElementById("nextBtn").addEventListener("click", function() { state.page++; state.expanded = null; render(); window.scrollTo(0, 0); });

// Card click delegation
document.getElementById("results").addEventListener("click", function(e) {
  var head = e.target.closest(".card-head");
  if (!head) return;
  var cas = head.getAttribute("data-cas");
  state.expanded = state.expanded === cas ? null : cas;
  render();
});

// Keyboard shortcut: Escape to clear search
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    state.search = ""; state.page = 0;
    document.getElementById("searchInput").value = "";
    document.getElementById("clearSearch").style.display = "none";
    render();
  }
});

// Initial render
render();
</script>
</body>
</html>
