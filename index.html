<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>震豐化學品互動查詢系統 v4.0</title>
<style>
:root {
  --bg: #F0F2F5;
  --card: #FFFFFF;
  --primary: #1A56DB;
  --primary-light: #E8EEFB;
  --primary-dark: #143FAE;
  --accent: #0EA5E9;
  --text: #1F2937;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --border: #E5E7EB;
  --border2: #D1D5DB;
  --hover: #F9FAFB;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.hero {
  background: linear-gradient(135deg, #1A56DB 0%, #0EA5E9 50%, #06B6D4 100%);
  padding: 32px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 70%, rgba(255,255,255,.08) 0%, transparent 60%);
}
.hero h1 { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: .5px; position: relative; }
.hero .sub { font-size: 13px; color: rgba(255,255,255,.8); margin-top: 6px; position: relative; }

.wrap { max-width: 920px; margin: -20px auto 0; padding: 0 16px 24px; position: relative; z-index: 1; }

/* STATS */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform .15s, box-shadow .15s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.stat-num { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 3px; font-weight: 500; }

/* SEARCH */
.search-wrap {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 14px;
}
.search-box { position: relative; }
.search-box input {
  width: 100%; padding: 14px 44px 14px 48px;
  font-size: 15px; border: 2px solid var(--border);
  border-radius: 12px; outline: none; background: var(--hover);
  transition: all .2s;
}
.search-box input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(26,86,219,.12); }
.search-box input::placeholder { color: var(--text3); }
.search-box .s-icon { position: absolute; left: 16px; top: 15px; color: var(--text3); pointer-events: none; }
.search-box .x-btn {
  position: absolute; right: 12px; top: 11px;
  background: var(--border); border: none; cursor: pointer;
  color: var(--text2); font-size: 16px; padding: 4px 8px;
  border-radius: 8px; transition: all .15s; display: none;
}
.search-box .x-btn:hover { background: var(--border2); }

/* TOOLBAR */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  border-radius: 10px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); transition: all .15s;
  box-shadow: var(--shadow);
}
.btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn .badge {
  background: #fff; color: var(--primary);
  border-radius: 10px; font-size: 11px;
  padding: 1px 7px; font-weight: 800;
  display: none;
}
.btn.active .badge { display: inline; }
.btn-clear { font-size: 12px; color: #EF4444; background: none; border: none; cursor: pointer; font-weight: 600; display: none; }
.btn-clear:hover { text-decoration: underline; }
.count { font-size: 13px; color: var(--text2); margin-left: auto; }
.count strong { color: var(--text); font-weight: 700; }

/* FILTERS */
.filters {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; padding: 16px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.filters.show { display: grid; }
.filters label { font-size: 11px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.filters select {
  width: 100%; padding: 10px 12px; font-size: 13px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--hover); cursor: pointer;
  transition: border-color .15s;
}
.filters select:focus { border-color: var(--primary); outline: none; }

/* GRID CONTAINER */
#res {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 14px;
}

/* CARDS - SQUARE TILES */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all .25s ease;
  box-shadow: var(--shadow);
  aspect-ratio: 1;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 14px;
  text-align: center;
  position: relative;
  user-select: none;
}
.card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-3px); }
.card-icon {
  width: 50px; height: 50px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800;
  color: #fff;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.tag-cas {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 11px; color: var(--primary);
  background: var(--primary-light);
  padding: 2px 8px; border-radius: 6px;
  font-weight: 600; white-space: nowrap;
  border: 1px solid rgba(26,86,219,.15);
  margin-bottom: 8px;
  display: inline-block;
}
.card-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.card-en { font-size: 11px; color: var(--text2); font-weight: 400; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
.tag-cat {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 6px;
  white-space: nowrap;
  display: inline-block;
}
.card-sup { font-size: 10px; color: var(--text3); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }

/* MODAL OVERLAY */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.45);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .2s ease;
  padding: 20px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card);
  border-radius: 18px;
  max-width: 560px; width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  animation: modalIn .25s ease;
  position: relative;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header {
  padding: 24px 24px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.modal-header .card-icon { margin: 0 auto 12px; width: 56px; height: 56px; font-size: 24px; border-radius: 16px; }
.modal-header .tag-cas { font-size: 13px; padding: 4px 14px; margin-bottom: 10px; }
.modal-header .card-name { font-size: 20px; margin-bottom: 4px; display: block; -webkit-line-clamp: unset; }
.modal-header .card-en { font-size: 13px; display: block; -webkit-line-clamp: unset; margin-bottom: 8px; }
.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px;
  border: none; border-radius: 10px;
  background: var(--hover); color: var(--text2);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 16px 24px 24px; }
.props {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.prop {
  background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
  border-radius: 10px;
  padding: 10px 14px;
  border: 1px solid #E2E8F0;
}
.prop-label { font-size: 10px; color: var(--text3); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.prop-val { font-size: 13px; color: var(--text); font-weight: 600; word-break: break-word; }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.empty .t1 { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty .t2 { font-size: 13px; margin-top: 4px; }

/* PAGER */
.pager { display: none; justify-content: center; align-items: center; gap: 10px; margin-top: 18px; }
.pager button {
  padding: 8px 18px; font-size: 13px; font-weight: 600;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text);
  cursor: pointer; transition: all .15s;
  box-shadow: var(--shadow);
}
.pager button:hover:not(:disabled) { background: var(--primary); color: #fff; border-color: var(--primary); }
.pager button:disabled { background: var(--hover); color: var(--text3); cursor: default; }
.pager span { font-size: 13px; color: var(--text2); font-weight: 500; }

/* FOOTER */
.footer {
  text-align: center; margin-top: 24px;
  padding: 16px; font-size: 11px; color: var(--text3);
  border-top: 1px solid var(--border);
}
.footer a { color: var(--primary); text-decoration: none; }

/* RESPONSIVE */
@media(max-width:640px) {
  .hero h1 { font-size: 20px; }
  .hero { padding: 24px 16px 22px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  #res { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .props { grid-template-columns: 1fr; }
  .filters { grid-template-columns: 1fr; }
  .stat-num { font-size: 20px; }
  .card-icon { width: 40px; height: 40px; font-size: 18px; }
  .card-name { font-size: 13px; }
  .card-en { font-size: 10px; }
  .card { padding: 14px 10px; }
  .modal { max-width: 95vw; }
  .modal-header { padding: 20px 16px 14px; }
  .modal-body { padding: 14px 16px 20px; }
}
</style>
</head>

function filt(){
  var s=S.s.toLowerCase().trim();
  return D.filter(function(d){
    if(s){
      var ok=d.c.toLowerCase().indexOf(s)>=0||(d.z||"").toLowerCase().indexOf(s)>=0||(d.e||"").toLowerCase().indexOf(s)>=0||(d.sup||"").toLowerCase().indexOf(s)>=0;
      if(!ok)return false;
    }
    if(S.cat&&d.cat!==S.cat)return false;
    if(S.ind&&(d.ti||"").indexOf(S.ind)<0)return false;
    return true;
  });
}

function propH(l,v){
  if(!v||!v.trim())return"";
  return '<div class="prop"><div class="prop-label">'+esc(l)+'</div><div class="prop-val">'+esc(v)+'</div></div>';
}

function render(){
  var r=filt();
  var tp=Math.ceil(r.length/PS)||1;
  if(S.pg>=tp)S.pg=tp-1;
  if(S.pg<0)S.pg=0;
  var sl=r.slice(S.pg*PS,(S.pg+1)*PS);

  document.getElementById("rc").textContent=r.length;

  // Filter state
  var af=[S.cat,S.ind].filter(Boolean).length;
  var fb=document.getElementById("fb");
  fb.style.display=af>0?"inline":"none";
  fb.textContent=af;
  var bf=document.getElementById("bf");
  bf.className=S.sf?"btn active":"btn";
  document.getElementById("fp").className=S.sf?"filters show":"filters";
  document.getElementById("bc").style.display=af>0?"inline":"none";

  // Cards - square grid tiles
  var h="";
  if(!sl.length){
    h='<div class="empty" style="grid-column:1/-1"><div class="icon">&#128270;</div><div class="t1">查無符合條件的產品</div><div class="t2">請調整搜尋關鍵字或篩選條件</div></div>';
  } else {
    sl.forEach(function(d){
      var c=gc(d.cat);
      var catTag=(d.cat)?'<span class="tag-cat" style="background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2]+'">'+esc(d.cat)+'</span>':"";
      var ico=catIco(d.cat);
      var supLine=d.sup?'<div class="card-sup">'+esc(d.sup)+'</div>':"";

      h+='<div class="card-icon" style="background:linear-gradient(135deg,'+c[3]+','+c[1]+')">'+ico+'</div>';
      h+='<span class="tag-cas">'+esc(d.c)+'</span>';
      h+='<div class="card-name">'+esc(d.z||"—")+'</div>';
      h+='<div class="card-en">'+esc(d.e||"")+'</div>';
      h+=catTag;
      h+=supLine;
      h+='</div>';
    });
  }
  document.getElementById("res").innerHTML=h;

  // Pager
  var pg=document.getElementById("pg");
  if(tp>1){pg.style.display="flex";document.getElementById("pi").textContent=(S.pg+1)+" / "+tp;document.getElementById("pp").disabled=S.pg===0;document.getElementById("pn").disabled=S.pg>=tp-1}

}

document.getElementById("bc").addEventListener("click",function(){S.cat="";S.ind="";S.pg=0;document.getElementById("fC").value="";document.getElementById("fI").value="";render()});
document.getElementById("fC").addEventListener("change",function(e){S.cat=e.target.value;S.pg=0;render()});
document.getElementById("fI").addEventListener("change",function(e){S.ind=e.target.value;S.pg=0;render()});
document.getElementById("pp").addEventListener("click",function(){if(S.pg>0){S.pg--;S.exp=null;render();window.scrollTo(0,0)}});
document.getElementById("pn").addEventListener("click",function(){S.pg++;S.exp=null;render();window.scrollTo(0,0)});
document.getElementById("res").addEventListener("click",function(e){var card=e.target.closest(".card");if(!card)return;var cas=card.getAttribute("data-c");if(!cas)return;showModal(cas)});
document.addEventListener("keydown",function(e){if(e.key==="Escape"){var m=document.querySelector(".modal-overlay");if(m){m.remove();return}S.s="";S.pg=0;document.getElementById("si").value="";document.getElementById("xb").style.display="none";render()}});

function showModal(cas){
  var d=null;
  for(var i=0;i<D.length;i++){if(D[i].c===cas){d=D[i];break}}
  if(!d)return;
  var old=document.querySelector(".modal-overlay");
  if(old)old.remove();
  var c=gc(d.cat);
  var catTag=(d.cat)?'<span class="tag-cat" style="background:'+c[0]+';color:'+c[1]+';border:1px solid '+c[2]+'">'+esc(d.cat)+'</span>':"";
  var ico=catIco(d.cat);
  var mh='<div class="modal-overlay">';
  mh+='<div class="modal">';
  mh+='<button class="modal-close">&times;</button>';
  mh+='<div class="modal-header">';
  mh+='<div class="card-icon" style="background:linear-gradient(135deg,'+c[3]+','+c[1]+')">'+ico+'</div>';
  mh+='<span class="tag-cas">'+esc(d.c)+'</span>';
  mh+='<div class="card-name">'+esc(d.z||"—")+'</div>';
  mh+='<div class="card-en">'+esc(d.e||"")+'</div>';
  mh+=catTag;
  mh+='</div>';
  mh+='<div class="modal-body"><div class="props">';
  mh+=propH("型態 Form",d.f);
  mh+=propH("pH 值",d.ph);
  mh+=propH("密度 Density (g/cm³)",d.d);
  mh+=propH("目標產業",d.ti);
  mh+=propH("主要應用",d.app);
  mh+=propH("可用文件",d.doc);
  mh+=propH("供應商 Supplier",d.sup);
  mh+=propH("參考價格 NT$/kg",d.pr);
  mh+='</div></div></div></div>';
  document.body.insertAdjacentHTML("beforeend",mh);
  var overlay=document.querySelector(".modal-overlay");
  overlay.addEventListener("click",function(e){if(e.target===overlay||e.target.closest(".modal-close"))overlay.remove()});
}

render();
</script>
</body>
