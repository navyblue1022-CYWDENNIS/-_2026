<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水處理化學品採購選擇系統 | 震豐股份有限公司</title>
<style>
  :root {
    --primary: #1a3a5c;
    --primary-light: #2563a8;
    --accent: #0ea5e9;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --tab-cooling: #0ea5e9;
    --tab-boiler: #f97316;
    --tab-waste: #8b5cf6;
    --tab-ro: #06b6d4;
    --tab-drinking: #22c55e;
    --tab-food: #ec4899;
    --tab-solvent: #78716c;
    --tab-lube: #92400e;
    --tab-resin: #6d28d9;
    --tab-medical: #be185d;
    --tab-refrig: #0e7490;
    --tab-specialty: #4d7c0f;
    --tab-hardware: #b45309;
    --tab-aviation: #1e40af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--gray-100); color: var(--gray-800); }

  /* Header */
  .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 16px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  .header-subtitle { font-size: 12px; opacity: .8; margin-top: 2px; }
  .header-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); border-radius: 20px; padding: 4px 14px; font-size: 12px; }

  /* Search & Controls */
  .controls { background: white; border-bottom: 1px solid var(--gray-200); padding: 14px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .controls-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }
  #searchInput { width: 100%; padding: 9px 12px 9px 38px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s; }
  #searchInput:focus { border-color: var(--accent); }
  .ctrl-btn { padding: 8px 16px; border: 1.5px solid var(--gray-200); border-radius: 8px; background: white; font-size: 13px; cursor: pointer; color: var(--gray-700); transition: all .2s; white-space: nowrap; }
  .ctrl-btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
  .ctrl-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .inquiry-btn { padding: 8px 18px; border: none; border-radius: 8px; background: var(--success); color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap; }
  .inquiry-btn:hover { background: #15803d; }
  .count-badge { background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--gray-600); white-space: nowrap; }

  /* Tabs */
  .tabs { max-width: 1400px; margin: 20px auto 0; padding: 0 24px; }
  .tab-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border: 2px solid transparent; border-radius: 10px 10px 0 0; cursor: pointer; font-size: 14px; font-weight: 600; background: white; color: var(--gray-500); transition: all .2s; border-bottom: none; }
  .tab-btn:hover { color: var(--gray-700); background: var(--gray-50); }
  .tab-btn.active { color: white; border-color: transparent; border-bottom: none; }
  .tab-btn .tab-icon { font-size: 18px; }
  .tab-btn .tab-count { background: rgba(255,255,255,.25); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
  .tab-btn:not(.active) .tab-count { background: var(--gray-100); color: var(--gray-500); }
  .tab-btn[data-tab="cooling"].active { background: var(--tab-cooling); }
  .tab-btn[data-tab="boiler"].active { background: var(--tab-boiler); }
  .tab-btn[data-tab="waste"].active { background: var(--tab-waste); }
  .tab-btn[data-tab="ro"].active { background: var(--tab-ro); }
  .tab-btn[data-tab="drinking"].active { background: var(--tab-drinking); }
  .tab-btn[data-tab="food"].active { background: var(--tab-food); }
  .tab-btn[data-tab="solvent"].active { background: var(--tab-solvent); }
  .tab-btn[data-tab="lube"].active { background: var(--tab-lube); }
  .tab-btn[data-tab="resin"].active { background: var(--tab-resin); }
  .tab-btn[data-tab="medical"].active { background: var(--tab-medical); }
  .tab-btn[data-tab="refrig"].active { background: var(--tab-refrig); }
  .tab-btn[data-tab="specialty"].active { background: var(--tab-specialty); }
  .tab-btn[data-tab="hardware"].active { background: var(--tab-hardware); }
  .tab-btn[data-tab="aviation"].active { background: var(--tab-aviation); }
  .flash-high { color: #dc2626; font-weight: 700; }
  .flash-mid { color: #d97706; font-weight: 700; }
  .flash-low { color: #16a34a; font-weight: 700; }
  .badge-bio { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .badge-nobio { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }

  /* Content */
  .content { max-width: 1400px; margin: 0 auto; padding: 0 24px 32px; }
  .tab-content { display: none; background: white; border-radius: 0 12px 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; }
  .tab-content.active { display: block; }

  /* Category pills */
  .cat-bar { padding: 16px 20px 12px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .cat-label { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-right: 4px; }
  .cat-pill { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200); background: white; font-size: 12px; cursor: pointer; color: var(--gray-600); transition: all .2s; white-space: nowrap; }
  .cat-pill:hover { border-color: var(--gray-300); background: var(--gray-50); }
  .cat-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th { background: var(--gray-800); color: white; padding: 11px 14px; text-align: left; font-weight: 600; font-size: 12.5px; white-space: nowrap; position: sticky; top: 0; }
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { background: var(--gray-700); }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background .15s; cursor: pointer; }
  tbody tr:hover { background: #eff6ff; }
  tbody tr.selected { background: #dbeafe; }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .td-name { font-weight: 600; color: var(--gray-800); }
  .td-en { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .td-cas { font-family: monospace; font-size: 12px; color: var(--primary-light); }
  .td-conc { font-size: 12px; color: var(--gray-700); max-width: 120px; }
  .td-note { font-size: 12px; color: var(--gray-600); max-width: 200px; }
  .td-check { width: 36px; text-align: center; }
  .row-cb { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-yes { background: #dcfce7; color: #16a34a; }
  .badge-checking { background: #fef9c3; color: #a16207; }
  .badge-na { background: var(--gray-100); color: var(--gray-500); }
  .badge-star { background: #fff7ed; color: #ea580c; }
  .badge-star2 { background: #fef3c7; color: #b45309; font-size: 12px; }
  .badge-cat { background: #eff6ff; color: var(--primary-light); font-size: 11px; }

  /* Priority dot */
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .p-core { background: #dc2626; }
  .p-rec { background: #f97316; }
  .p-alt { background: #94a3b8; }

  /* Empty row */
  .empty-row td { padding: 48px; text-align: center; color: var(--gray-400); font-size: 14px; }

  /* Summary bar */
  .summary-bar { padding: 10px 20px; background: var(--gray-50); border-top: 1px solid var(--gray-200); display: flex; gap: 20px; align-items: center; font-size: 12px; color: var(--gray-600); flex-wrap: wrap; }
  .summary-bar b { color: var(--gray-800); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 640px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: flex-start; justify-content: space-between; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--gray-800); }
  .modal-en { font-size: 13px; color: var(--gray-500); margin-top: 3px; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray-400); padding: 0 4px; }
  .modal-close:hover { color: var(--gray-700); }
  .modal-body { padding: 20px 24px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .info-item { background: var(--gray-50); border-radius: 8px; padding: 12px 14px; }
  .info-label { font-size: 11px; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .info-value { font-size: 14px; color: var(--gray-800); font-weight: 600; }
  .info-value.mono { font-family: monospace; color: var(--primary-light); }
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .detail-section p { font-size: 14px; color: var(--gray-700); line-height: 1.6; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }
  .btn-add { padding: 9px 20px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #15803d; }
  .btn-cancel { padding: 9px 20px; background: white; color: var(--gray-600); border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; cursor: pointer; }

  /* Inquiry panel */
  .inquiry-panel { display: none; position: fixed; bottom: 24px; right: 24px; width: 320px; background: white; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.2); border: 1.5px solid var(--gray-200); z-index: 900; }
  .inquiry-panel.open { display: block; }
  .inq-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
  .inq-title { font-size: 14px; font-weight: 700; color: var(--gray-800); }
  .inq-close-btn { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 18px; }
  .inq-list { padding: 8px 16px; max-height: 200px; overflow-y: auto; }
  .inq-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
  .inq-item:last-child { border-bottom: none; }
  .inq-remove { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .inq-remove:hover { color: var(--danger); }
  .inq-footer { padding: 12px 16px; border-top: 1px solid var(--gray-200); }
  .inq-export { width: 100%; padding: 9px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .inq-export:hover { background: var(--primary-light); }
  .inq-empty { padding: 20px; text-align: center; color: var(--gray-400); font-size: 13px; }

  /* Floating btn */
  .float-btn { display: none; position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--success); color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(22,163,74,.4); z-index: 899; gap: 8px; align-items: center; }
  .float-btn.show { display: flex; }
  .float-btn:hover { background: #15803d; }
  #inqCount { background: rgba(255,255,255,.3); border-radius: 12px; padding: 1px 7px; font-size: 12px; }

  /* Compliance badges */
  .badge-toxic { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; font-weight: 700; }
  .badge-reg106 { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
  .badge-safe { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
  .badge-pa { background: #fdf4ff; color: #7e22ce; border: 1px solid #d8b4fe; }
  tr.has-toxic { border-left: 3px solid #dc2626; }
  tr.has-toxic td:first-child { background: #fff5f5; }
  .reg-col { white-space: nowrap; }

  /* Responsive */
  @media(max-width: 768px) {
    .header-inner { flex-direction: column; align-items: flex-start; gap: 8px; }
    .info-grid { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    .tab-btn { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-title">💧 水處理化學品採購選擇系統</div>
      <div class="header-subtitle">Water Treatment Chemicals Procurement Tool | 2026 Q2 版本</div>
    </div>
    <div class="header-badge">十四大應用領域 · 320+ 品項</div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋產品名稱、CAS No.、功能分類…">
    </div>
    <button class="ctrl-btn active" id="filterAll" onclick="setSourceFilter('all')">全部</button>
    <button class="ctrl-btn" id="filterYes" onclick="setSourceFilter('yes')">✅ 可供應</button>
    <button class="ctrl-btn" id="filterCheck" onclick="setSourceFilter('checking')">🔍 確認中</button>
    <button class="ctrl-btn" id="filterToxic" onclick="setSourceFilter('toxic')" style="border-color:#fca5a5;color:#b91c1c;">⚠️ 毒化物列管</button>
    <button class="ctrl-btn" id="filterReg106" onclick="setSourceFilter('reg106')" style="border-color:#93c5fd;color:#1d4ed8;">📋 既有化學物質</button>
    <span class="count-badge" id="visibleCount">顯示 0 筆</span>
    <button class="inquiry-btn" onclick="toggleInquiry()">📋 詢價清單 <span id="floatCount">0</span></button>
  </div>
</div>

<div class="tabs">
  <div class="tab-list">
    <button class="tab-btn active" data-tab="cooling" onclick="switchTab('cooling')">
      <span class="tab-icon">🌀</span> 冷卻水塔 <span class="tab-count" id="cnt-cooling">23</span>
    </button>
    <button class="tab-btn" data-tab="boiler" onclick="switchTab('boiler')">
      <span class="tab-icon">🔥</span> 鍋爐水 <span class="tab-count" id="cnt-boiler">16</span>
    </button>
    <button class="tab-btn" data-tab="waste" onclick="switchTab('waste')">
      <span class="tab-icon">♻️</span> 廢水處理 <span class="tab-count" id="cnt-waste">21</span>
    </button>
    <button class="tab-btn" data-tab="ro" onclick="switchTab('ro')">
      <span class="tab-icon">🔬</span> RO/膜系統 <span class="tab-count" id="cnt-ro">12</span>
    </button>
    <button class="tab-btn" data-tab="drinking" onclick="switchTab('drinking')">
      <span class="tab-icon">🚰</span> 飲用水 <span class="tab-count" id="cnt-drinking">10</span>
    </button>
    <button class="tab-btn" data-tab="food" onclick="switchTab('food')">
      <span class="tab-icon">🍽️</span> 食品加工用水 <span class="tab-count" id="cnt-food">8</span>
    </button>
    <button class="tab-btn" data-tab="solvent" onclick="switchTab('solvent')">
      <span class="tab-icon">🧴</span> 碳氫溶劑 <span class="tab-count" id="cnt-solvent">18</span>
    </button>
    <button class="tab-btn" data-tab="lube" onclick="switchTab('lube')">
      <span class="tab-icon">🔧</span> 潤滑油/添加劑 <span class="tab-count" id="cnt-lube">53</span>
    </button>
    <button class="tab-btn" data-tab="resin" onclick="switchTab('resin')">
      <span class="tab-icon">🎨</span> 樹脂/塗料/接著劑 <span class="tab-count" id="cnt-resin">28</span>
    </button>
    <button class="tab-btn" data-tab="medical" onclick="switchTab('medical')">
      <span class="tab-icon">💊</span> 醫藥/個人護理 <span class="tab-count" id="cnt-medical">23</span>
    </button>
    <button class="tab-btn" data-tab="refrig" onclick="switchTab('refrig')">
      <span class="tab-icon">❄️</span> 冷凍/空調 <span class="tab-count" id="cnt-refrig">22</span>
    </button>
    <button class="tab-btn" data-tab="specialty" onclick="switchTab('specialty')">
      <span class="tab-icon">⚗️</span> 特用化學 <span class="tab-count" id="cnt-specialty">44</span>
    </button>
    <button class="tab-btn" data-tab="hardware" onclick="switchTab('hardware')">
      <span class="tab-icon">🔩</span> 五金/電子/光電 <span class="tab-count" id="cnt-hardware">24</span>
    </button>
    <button class="tab-btn" data-tab="aviation" onclick="switchTab('aviation')">
      <span class="tab-icon">✈️</span> 航空用化學品 <span class="tab-count" id="cnt-aviation">7</span>
    </button>
  </div>
</div>

<div class="content">
  <!-- Each tab content injected by JS -->
  <div id="tab-cooling" class="tab-content active"></div>
  <div id="tab-boiler" class="tab-content"></div>
  <div id="tab-waste" class="tab-content"></div>
  <div id="tab-ro" class="tab-content"></div>
  <div id="tab-drinking" class="tab-content"></div>
  <div id="tab-food" class="tab-content"></div>
  <div id="tab-solvent" class="tab-content"></div>
  <div id="tab-lube" class="tab-content"></div>
  <div id="tab-resin" class="tab-content"></div>
  <div id="tab-medical" class="tab-content"></div>
  <div id="tab-refrig" class="tab-content"></div>
  <div id="tab-specialty" class="tab-content"></div>
  <div id="tab-hardware" class="tab-content"></div>
  <div id="tab-aviation" class="tab-content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-en" id="mEn"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item"><div class="info-label">CAS No.</div><div class="info-value mono" id="mCas"></div></div>
        <div class="info-item"><div class="info-label">功能分類</div><div class="info-value" id="mCat"></div></div>
        <div class="info-item"><div class="info-label">主要有效成分</div><div class="info-value" id="mIngredient"></div></div>
        <div class="info-item"><div class="info-label">典型使用濃度</div><div class="info-value" id="mConc"></div></div>
        <div class="info-item"><div class="info-label">供應狀態</div><div class="info-value" id="mSource"></div></div>
        <div class="info-item"><div class="info-label">應用領域</div><div class="info-value" id="mDomain"></div></div>
      </div>
      <div class="detail-section" id="mCompSection">
        <h4>台灣法規狀態（TCCSCA / 既有化學物質）</h4>
        <p id="mComp" style="line-height:1.7;"></p>
      </div>
      <div class="detail-section">
        <h4>作用機理</h4>
        <p id="mMech"></p>
      </div>
      <div class="detail-section">
        <h4>採購重點 / 技術備註</h4>
        <p id="mNote"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModalDirect()">關閉</button>
      <button class="btn-add" id="mAddBtn" onclick="addToInquiryFromModal()">➕ 加入詢價清單</button>
    </div>
  </div>
</div>

<!-- Inquiry Panel -->

// State
let currentTab = 'cooling';
let currentCat = 'all';
let sourceFilter = 'all';
let searchTerm = '';
let inquiryList = [];
let currentModalProduct = null;

// ==================== RENDER ====================
function getCategories(tab) {
  const cats = [...new Set(PRODUCTS[tab].map(p => p.cat))];
  return cats;
}

function renderTab(tab) {
  const container = document.getElementById('tab-' + tab);
  const cats = getCategories(tab);
  const catId = 'cat-bar-' + tab;

  let catPills = `<div class="cat-bar" id="${catId}">
    <span class="cat-label">功能分類</span>
    <span class="cat-pill active" onclick="setCat('${tab}','all',this)">全部品項</span>`;
  cats.forEach(c => {
    catPills += `<span class="cat-pill" onclick="setCat('${tab}','${c.replace(/'/g,"\\'")}',this)">${c}</span>`;
  });
  catPills += `</div>`;

  const tableHtml = `
    <div class="table-wrap">
      <table id="tbl-${tab}">
        <thead>
          <tr>
            <th class="td-check"><input type="checkbox" onchange="selectAllVisible(this,'${tab}')" title="全選"/></th>
            <th>化學品名稱</th>
            <th>功能分類</th>
            <th>CAS No.</th>
            <th>主要成分</th>
            <th>典型使用濃度</th>
            <th>供應狀態</th>
            <th class="reg-col">法規狀態</th>
            <th>採購重點</th>
          </tr>
        </thead>
        <tbody id="tbody-${tab}"></tbody>
      </table>
    </div>
    <div class="summary-bar" id="summary-${tab}"></div>`;

  container.innerHTML = catPills + tableHtml;
}

function getComplianceInfo(p) {
  const cas1 = p.cas ? p.cas.split('/')[0].trim() : '';
  return { toxic: TOXIC_344[cas1] || null, reg: REG_106[cas1] || null };
}

function renderRows(tab) {
  const tbody = document.getElementById('tbody-' + tab);
  if (!tbody) return;
  const products = PRODUCTS[tab];
  const filtered = products.filter(p => {
    if (currentCat !== 'all' && tab === currentTab && p.cat !== currentCat) return false;
    if (sourceFilter === 'yes' && p.src !== 'YES') return false;
    if (sourceFilter === 'checking' && p.src !== 'CHECKING') return false;
    if (sourceFilter === 'toxic') { const {toxic} = getComplianceInfo(p); if (!toxic) return false; }
    if (sourceFilter === 'reg106') { const {reg} = getComplianceInfo(p); if (!reg) return false; }
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return p.zh.toLowerCase().includes(s) || p.en.toLowerCase().includes(s) ||
             (p.cas && p.cas.toLowerCase().includes(s)) || p.cat.toLowerCase().includes(s) ||
             (p.note && p.note.toLowerCase().includes(s));
    }
    return true;
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">🔍 未找到符合條件的品項</td></tr>`;
    updateSummary(tab, 0, products.length);
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const srcBadge = p.src === 'YES' ? '<span class="badge badge-yes">✅ 可供應</span>' :
                     p.src === 'CHECKING' ? '<span class="badge badge-checking">🔍 確認中</span>' :
                     '<span class="badge badge-na">— 暫無</span>';
    const starBadge = p.star2 ? '<span class="badge badge-star2">⭐⭐ 核心推薦</span> ' :
                      p.star ? '<span class="badge badge-star">⭐ 推薦</span> ' : '';
    const {toxic, reg} = getComplianceInfo(p);
    const inInquiry = inquiryList.find(i => i.id === p.id);
    let rowClass = inInquiry ? 'selected' : '';
    let compBadge = '';
    if (toxic) {
      compBadge += `<span class="badge badge-toxic">⚠️ 毒化物 ${toxic.no}</span> `;
      rowClass = (rowClass + ' has-toxic').trim();
    }
    if (reg) {
      compBadge += `<span class="badge badge-reg106">📋 既有 ${reg.no}</span>`;
    }
    if (!toxic && !reg) {
      compBadge = '<span class="badge badge-safe">✓ 一般</span>';
    }
    return `<tr class="${rowClass}" onclick="openModal('${p.id}','${tab}')" id="row-${p.id}">
      <td class="td-check" onclick="event.stopPropagation()">
        <input type="checkbox" class="row-cb" ${inInquiry?'checked':''} onchange="toggleInquiryItem('${p.id}','${tab}',this)" title="加入詢價">
      </td>
      <td>
        <div class="td-name">${starBadge}${p.zh}</div>
        <div class="td-en">${p.en}</div>
      </td>
      <td><span class="badge badge-cat">${p.cat}</span></td>
      <td class="td-cas">${p.cas}</td>
      <td style="font-size:12px;color:var(--gray-600);max-width:130px;">${p.ingredient}</td>
      <td class="td-conc">${p.conc}</td>
      <td>${srcBadge}</td>
      <td class="reg-col">${compBadge}</td>
      <td class="td-note">${(p.note||'').replace(/★★|★/g,'').trim().substring(0,60)}${p.note&&p.note.length>60?'…':''}</td>
    </tr>`;
  }).join('');

  updateSummary(tab, filtered.length, products.length);
  updateVisibleCount();
}

function updateSummary(tab, shown, total) {
  const s = document.getElementById('summary-' + tab);
  if (!s) return;
  const yes = PRODUCTS[tab].filter(p=>p.src==='YES').length;
  const checking = PRODUCTS[tab].filter(p=>p.src==='CHECKING').length;
  s.innerHTML = `<span>顯示 <b>${shown}</b> / ${total} 筆</span>
    <span>✅ 可供應 <b>${yes}</b> 項</span>
    <span>🔍 確認中 <b>${checking}</b> 項</span>
    <span>— 暫無 <b>${total-yes-checking}</b> 項</span>`;
}

function updateVisibleCount() {
  if (currentTab === 'solvent') {
    const f = SOLVENTS.filter(s => {
      if (solventCat !== 'all' && s.lineC !== solventCat) return false;
      if (searchTerm) { const t = searchTerm.toLowerCase(); return s.name.toLowerCase().includes(t)||s.apps.toLowerCase().includes(t); }
      return true;
    });
    document.getElementById('visibleCount').textContent = `顯示 ${f.length} 筆`;
    return;
  }
  const products = PRODUCTS[currentTab];
  if (!products) { document.getElementById('visibleCount').textContent = '顯示 0 筆'; return; }
  const filtered = products.filter(p => {
    if (currentCat !== 'all' && p.cat !== currentCat) return false;
    if (sourceFilter === 'yes' && p.src !== 'YES') return false;
    if (sourceFilter === 'checking' && p.src !== 'CHECKING') return false;
    if (sourceFilter === 'toxic') { const {toxic} = getComplianceInfo(p); if (!toxic) return false; }
    if (sourceFilter === 'reg106') { const {reg} = getComplianceInfo(p); if (!reg) return false; }
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return p.zh.includes(s) || p.en.toLowerCase().includes(s) || (p.cas&&p.cas.includes(s)) || p.cat.includes(s);
    }
    return true;
  });
  document.getElementById('visibleCount').textContent = `顯示 ${filtered.length} 筆`;
}

// ==================== SOLVENT RENDER ====================
let solventCat = 'all';

function renderSolventTab() {
  const container = document.getElementById('tab-solvent');
  if (!container) return;
  const series = [...new Set(SOLVENTS.map(s => s.lineC))];
  let catPills = `<div class="cat-bar" id="cat-bar-solvent">
    <span class="cat-label">產品系列</span>
    <span class="cat-pill active" onclick="setSolventCat('all',this)">全部系列</span>`;
  series.forEach(s => {
    catPills += `<span class="cat-pill" onclick="setSolventCat('${s.replace(/'/g,"\\'")}',this)">${s}</span>`;
  });
  catPills += `</div>`;
  const tableHtml = `
    <div class="table-wrap">
      <table id="tbl-solvent">
        <thead>
          <tr>
            <th>產品名稱</th>
            <th>產品系列</th>
            <th>閃點 (°C)</th>
            <th>沸程 IBP→FBP (°C)</th>
            <th>密度 (kg/m³)</th>
            <th>黏度 (mPa·s)</th>
            <th>芳香烴 (%)</th>
            <th>生物降解</th>
            <th>主要應用</th>
          </tr>
        </thead>
        <tbody id="tbody-solvent"></tbody>
      </table>
    </div>
    <div class="summary-bar" id="summary-solvent"></div>`;
  container.innerHTML = catPills + tableHtml;
  renderSolventRows();
}

function setSolventCat(cat, el) {
  solventCat = cat;
  document.querySelectorAll('#cat-bar-solvent .cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderSolventRows();
}

function renderSolventRows() {
  const tbody = document.getElementById('tbody-solvent');
  if (!tbody) return;
  const filtered = SOLVENTS.filter(s => {
    if (solventCat !== 'all' && s.lineC !== solventCat) return false;
    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      return s.name.toLowerCase().includes(t) || s.lineC.toLowerCase().includes(t) || s.apps.toLowerCase().includes(t);
    }
    return true;
  });
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">🔍 未找到符合條件的品項</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(s => {
      const flashCls = s.flash < 23 ? 'flash-high' : s.flash < 60 ? 'flash-mid' : 'flash-low';
      const bioBadge = s.bio ? '<span class="badge badge-bio">♻️ 可降解</span>' : '<span class="badge badge-nobio">— 非降解</span>';
      const lineCls = s.lineC === 'Shell GTL 系列' ? 'badge-star' : s.lineC === 'Eidsol 環保系列' ? 'badge-safe' : 'badge-cat';
      return `<tr onclick="openSolventModal('${s.id}')">
        <td><div class="td-name">${s.name}</div></td>
        <td><span class="badge ${lineCls}">${s.lineC}</span></td>
        <td class="${flashCls}">${s.flash}</td>
        <td class="td-cas">${s.ibp} → ${s.fbp}</td>
        <td>${s.density}</td>
        <td>${s.visc}</td>
        <td>${s.arom}</td>
        <td>${bioBadge}</td>
        <td class="td-note">${s.apps}</td>
      </tr>`;
    }).join('');
  }
  const sm = document.getElementById('summary-solvent');
  if (sm) sm.innerHTML = `<span>顯示 <b>${filtered.length}</b> / ${SOLVENTS.length} 筆</span>
    <span>♻️ 可生物降解 <b>${SOLVENTS.filter(x=>x.bio).length}</b> 項</span>
    <span>🔴 閃點 &lt;23°C (易燃) <b>${SOLVENTS.filter(x=>x.flash<23).length}</b> 項</span>
    <span>🟡 閃點 23-60°C <b>${SOLVENTS.filter(x=>x.flash>=23&&x.flash<60).length}</b> 項</span>
    <span>🟢 閃點 ≥60°C <b>${SOLVENTS.filter(x=>x.flash>=60).length}</b> 項</span>`;
  updateVisibleCount();
}

function openSolventModal(id) {
  const s = SOLVENTS.find(x => x.id === id);
  if (!s) return;
  currentModalProduct = null;
  document.getElementById('mTitle').textContent = s.name;
  document.getElementById('mEn').textContent = s.lineC;
  document.getElementById('mCas').textContent = 'Flash Pt ' + s.flash + '°C';
  document.getElementById('mCat').textContent = s.lineC;
  document.getElementById('mIngredient').textContent = '密度 ' + s.density + ' kg/m³ | 黏度 ' + s.visc + ' mPa·s';
  document.getElementById('mConc').textContent = 'IBP ' + s.ibp + '°C → FBP ' + s.fbp + '°C';
  document.getElementById('mSource').textContent = s.bio ? '♻️ 可生物降解（OECD 301B）' : '— 非生物降解';
  document.getElementById('mDomain').textContent = '碳氫溶劑';
  document.getElementById('mMech').textContent = '芳香烴含量：' + s.arom + '% | 閃點（TCC）：' + s.flash + '°C | 沸程：' + s.ibp + '~' + s.fbp + '°C';
  document.getElementById('mNote').textContent = s.apps;
  document.getElementById('mComp').textContent = '碳氫溶劑不屬於水處理化學品，無需依台灣毒化物管理法申報（惟閃點<23°C者適用消防法令易燃液體管理）。';
  document.getElementById('mAddBtn').style.display = 'none';
  document.getElementById('detailModal').classList.add('open');
}

// ==================== CATALOG TAB RENDER ====================
const CAT_ICONS = {lube:'🔧',resin:'🎨',medical:'💊',refrig:'❄️',specialty:'⚗️',hardware:'🔩',aviation:'✈️'};

function renderCatTab(tab) {
  const container = document.getElementById('tab-' + tab);
  if (!container) return;
  const products = CAT_PRODUCTS[tab] || [];
  const filtered = products.filter(name => {
    if (!searchTerm) return true;
    return name.toLowerCase().includes(searchTerm.toLowerCase());
  });
  const icon = CAT_ICONS[tab] || '📦';
  const domainName = DOMAIN_NAMES[tab] || tab;
  let html = `<div class="cat-bar">
    <span class="cat-label">${icon} ${domainName}</span>
    <span style="font-size:12px;color:var(--gray-500);margin-left:8px;">共 ${filtered.length} 項產品</span>
  </div>
  <div class="table-wrap">
    <table id="tbl-${tab}">
      <thead>
        <tr>
          <th style="width:40px;">#</th>
          <th>產品名稱 / Product Name</th>
          <th style="width:140px;">類別</th>
          <th style="width:140px;">詢價操作</th>
        </tr>
      </thead>
      <tbody id="tbody-${tab}">`;
  if (filtered.length === 0) {
    html += `<tr class="empty-row"><td colspan="4">🔍 未找到符合條件的品項</td></tr>`;
  } else {
    filtered.forEach((name, idx) => {
      const id = tab + '_' + idx;
      const inInq = inquiryList.find(i => i.id === id);
      html += `<tr id="row-${id}" class="${inInq?'selected':''}">
        <td style="color:var(--gray-400);font-size:12px;">${idx+1}</td>
        <td><div class="td-name">${name}</div></td>
        <td><span class="badge badge-cat">${domainName}</span></td>
        <td><button class="ctrl-btn" style="padding:4px 10px;font-size:12px;" onclick="toggleCatInquiry('${id}','${tab}',${idx},this)">${inInq?'✔ 已加入':'➕ 加入詢價'}</button></td>
      </tr>`;
    });
  }
  html += `</tbody></table></div>
  <div class="summary-bar" id="summary-${tab}">顯示 ${filtered.length} / ${products.length} 項產品｜${domainName}</div>`;
  container.innerHTML = html;
}

function toggleCatInquiry(id, tab, idx, btn) {
  const name = CAT_PRODUCTS[tab][idx];
  const inInq = inquiryList.find(i => i.id === id);
  if (inInq) {
    inquiryList = inquiryList.filter(i => i.id !== id);
    btn.textContent = '➕ 加入詢價';
    document.getElementById('row-' + id).classList.remove('selected');
  } else {
    inquiryList.push({id, tab, name, en: name, cas: '—', src: 'YES'});
    btn.textContent = '✔ 已加入';
    document.getElementById('row-' + id).classList.add('selected');
  }
  updateInquiryPanel();
}

const CAT_TABS = ['lube','resin','medical','refrig','specialty','hardware','aviation'];

// ==================== INTERACTIONS ====================
function switchTab(tab) {
  currentTab = tab;
  currentCat = 'all';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'solvent') {
    solventCat = 'all';
    renderSolventTab();
    return;
  }
  if (CAT_TABS.includes(tab)) {
    renderCatTab(tab);
    return;
  }
  document.querySelectorAll('#cat-bar-' + tab + ' .cat-pill').forEach(function(p,i) {
    p.classList.toggle('active', i===0);
  });
  renderRows(tab);
}

function setCat(tab, cat, el) {
  currentCat = cat;
  document.querySelectorAll('#cat-bar-' + tab + ' .cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderRows(tab);
}

function setSourceFilter(f) {
  sourceFilter = f;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  const map = {all:'filterAll', yes:'filterYes', checking:'filterCheck', toxic:'filterToxic', reg106:'filterReg106'};
  if (map[f]) document.getElementById(map[f]).classList.add('active');
  Object.keys(PRODUCTS).forEach(t => renderRows(t));
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.trim();
  Object.keys(PRODUCTS).forEach(t => renderRows(t));
  if (currentTab === 'solvent') renderSolventRows();
  if (CAT_TABS.includes(currentTab)) renderCatTab(currentTab);
});

function selectAllVisible(masterCb, tab) {
  const rows = document.querySelectorAll('#tbody-' + tab + ' .row-cb');
  rows.forEach(cb => {
    cb.checked = masterCb.checked;
    const rowId = cb.closest('tr').id.replace('row-','');
    if (masterCb.checked) addToInquiry(rowId, tab);
    else removeFromInquiry(rowId);
  });
  renderRows(tab);
  updateInquiryPanel();
}

// ==================== MODAL ====================
function openModal(id, tab) {
  const p = PRODUCTS[tab].find(x => x.id === id);
  if (!p) return;
  currentModalProduct = {p, tab};
  document.getElementById('mTitle').textContent = p.zh;
  document.getElementById('mEn').textContent = p.en;
  document.getElementById('mCas').textContent = p.cas;
  document.getElementById('mCat').textContent = p.cat;
  document.getElementById('mIngredient').textContent = p.ingredient;
  document.getElementById('mConc').textContent = p.conc;
  document.getElementById('mDomain').textContent = DOMAIN_NAMES[tab];
  const srcText = p.src === 'YES' ? '✅ 可供應' : p.src === 'CHECKING' ? '🔍 確認中（洽業務確認）' : '— 暫無';
  document.getElementById('mSource').textContent = srcText;
  document.getElementById('mMech').textContent = p.mech;
  document.getElementById('mNote').textContent = p.note;
  const {toxic, reg} = getComplianceInfo(p);
  let compLines = [];
  if (toxic) compLines.push('⚠️ 毒性及關注化學物質：列管編號 ' + toxic.no + '（' + toxic.zh + '，' + toxic.level + '）。運作前須向環境部申請許可，並備妥緊急應變計畫。');
  if (reg)   compLines.push('📋 既有化學物質登錄清單：編號 ' + reg.no + '（' + reg.zh + '）。需依法完成年度申報義務。');
  if (!toxic && !reg) compLines.push('✓ 未列入毒性及關注化學物質（344項）及既有化學物質登錄清單（106項）。一般化學品管理規範適用，採購門檻較低。');
  document.getElementById('mComp').textContent = compLines.join('\n');
  document.getElementById('mAddBtn').style.display = '';
  const inList = inquiryList.find(i => i.id === id);
  const addBtn = document.getElementById('mAddBtn');
  addBtn.textContent = inList ? '✔ 已在詢價清單' : '➕ 加入詢價清單';
  addBtn.style.background = inList ? '#64748b' : '';
  document.getElementById('detailModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('detailModal').classList.remove('open');
  document.getElementById('mAddBtn').style.display = '';
  currentModalProduct = null;
}
function addToInquiryFromModal() {
  if (!currentModalProduct) return;
  const {p, tab} = currentModalProduct;
  addToInquiry(p.id, tab);
  document.getElementById('mAddBtn').textContent = '✔ 已在詢價清單';
  document.getElementById('mAddBtn').style.background = '#64748b';
  renderRows(tab);
  updateInquiryPanel();
}

// ==================== INQUIRY ====================
function addToInquiry(id, tab) {
  if (inquiryList.find(i => i.id === id)) return;
  const p = PRODUCTS[tab].find(x => x.id === id);
  if (p) inquiryList.push({id, tab, name: p.zh, en: p.en, cas: p.cas, src: p.src, conc: p.conc});
  updateInquiryPanel();
}
function removeFromInquiry(id) {
  inquiryList = inquiryList.filter(i => i.id !== id);
  updateInquiryPanel();
}
function toggleInquiryItem(id, tab, cb) {
  if (cb.checked) addToInquiry(id, tab);
  else removeFromInquiry(id);
  const row = document.getElementById('row-' + id);
  if (row) row.classList.toggle('selected', cb.checked);
  updateInquiryPanel();
}
function updateInquiryPanel() {
  const cnt = inquiryList.length;
  document.getElementById('floatCount').textContent = cnt;
  const list = document.getElementById('inqList');
  if (cnt === 0) {
    list.innerHTML = '<div class="inq-empty">尚未加入任何品項</div>';
  } else {
    list.innerHTML = inquiryList.map(i => `
      <div class="inq-item">
        <div>
          <div style="font-weight:600;font-size:12px;">${i.name}</div>
          <div style="font-size:11px;color:var(--gray-500);">${i.cas} · ${DOMAIN_NAMES[i.tab]||i.tab}</div>
        </div>
        <button class="inq-remove" onclick="removeFromInquiry('${i.id}');renderRows('${i.tab}');" title="移除">✕</button>
      </div>`).join('');
  }
}
function toggleInquiry() {
  document.getElementById('inquiryPanel').classList.toggle('open');
}
function exportInquiry() {
  if (inquiryList.length === 0) { alert('詢價清單為空'); return; }
  const header = '序號,化學品名稱,英文名稱,CAS No.,應用領域,典型使用濃度,供應狀態\n';
  const rows = inquiryList.map((i,idx) => {
    const isCat = CAT_TABS.includes(i.tab);
    const p = (!isCat && PRODUCTS[i.tab]) ? PRODUCTS[i.tab].find(x=>x.id===i.id) : null;
    const src = i.src==='YES'?'可供應':i.src==='CHECKING'?'確認中':'暫無';
    return `${idx+1},"${i.name}","${i.en}","${i.cas}","${DOMAIN_NAMES[i.tab]||i.tab}","${p?p.conc:''}","${src}"`;
  }).join('\n');
  const csv = header + rows;
  navigator.clipboard.writeText(csv).then(() => {
    alert('✅ 已複製 ' + inquiryList.length + ' 項詢價清單到剪貼簿！\n可直接貼入 Excel 或 Email。');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = csv;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ 已複製 ' + inquiryList.length + ' 項詢價清單！');
  });
}

// ==================== INIT ====================
Object.keys(PRODUCTS).forEach(tab => renderTab(tab));
Object.keys(PRODUCTS).forEach(tab => renderRows(tab));
document.getElementById('tab-cooling').classList.add('active');
Object.keys(PRODUCTS).forEach(tab => {
  const el = document.getElementById('cnt-' + tab);
  if (el) el.textContent = PRODUCTS[tab].length;
});
document.getElementById('cnt-solvent').textContent = SOLVENTS.length;
CAT_TABS.forEach(tab => {
  const el = document.getElementById('cnt-' + tab);
  if (el && CAT_PRODUCTS[tab]) el.textContent = CAT_PRODUCTS[tab].length;
});
</script>
